<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="weather-app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Prata&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
  </head>
  <body>
    <div class="header">
      <div class="locationContainer">
        <input type="text" class="location" placeholder="type here"/> 
        <p class="locationDetails"></p>
        <p class="coordinates"></p>
      </div>
      <div class="temperatureContainer">
        <p class="temperature"></p>
      </div>
    </div>
    <div class="additional">
      <p class="humidityText"><span class="humidity"></span></p>
      <p class="windText"><span class="wind"></span></p>
      <p class="precipitationText"><span class="precipitation"></span></p>
    </div>
    <script src="weather-app.js"></script>
  </body>
</html>
